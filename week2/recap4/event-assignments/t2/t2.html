<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurants</title>
  <link rel="stylesheet" href="t2.css">
  <script src="t2.js" defer></script>
</head>
<body>
  <h1>Restaurants</h1>
  <table id="restaurants-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Address</th>
      </tr>
    </thead>
    <tbody>
      <!-- Restaurant rows will be populated here -->
    </tbody>
  </table>

  <dialog id="restaurant-modal">
    <h2 id="restaurant-name"></h2>
    <p id="restaurant-address"></p>
    <p id="restaurant-postal"></p>
    <p id="restaurant-city"></p>
    <p id="restaurant-phone"></p>
    <p id="restaurant-company"></p>
    <button id="close-modal">Close</button>
  </dialog>
</body>
</html>
